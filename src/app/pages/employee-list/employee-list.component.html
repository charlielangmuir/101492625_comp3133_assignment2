<mat-toolbar color="primary">
  <span>Employee Management</span>
  <span class="spacer"></span>
  <button mat-icon-button routerLink="/employees/add"><mat-icon>add</mat-icon></button>
  <button mat-icon-button (click)="logout()"><mat-icon>logout</mat-icon></button>
</mat-toolbar>

<div class="container">
  <!-- Search bar -->
  <mat-card class="search-card">
    <mat-select [(ngModel)]="searchBy" placeholder="Search by">
      <mat-option value="department">Department</mat-option>
      <mat-option value="designation">Designation</mat-option>
    </mat-select>
    <mat-form-field appearance="outline">
      <input matInput [(ngModel)]="searchValue" placeholder="Enter value">
    </mat-form-field>
    <button mat-raised-button color="accent" (click)="search()">Search</button>
    <button mat-button (click)="loadEmployees()">Reset</button>
  </mat-card>

  <!-- Table -->
  <mat-card>
    <table mat-table [dataSource]="employees" class="full-width">
      <ng-container matColumnDef="photo">
        <th mat-header-cell *matHeaderCellDef>Photo</th>
        <td mat-cell *matCellDef="let e">
          <img [src]="e.employee_photo || 'assets/default-avatar.png'" width="40" style="border-radius:50%">
        </td>
      </ng-container>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let e">{{ e.first_name }} {{ e.last_name }}</td>
      </ng-container>
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let e">{{ e.email }}</td>
      </ng-container>
      <ng-container matColumnDef="department">
        <th mat-header-cell *matHeaderCellDef>Department</th>
        <td mat-cell *matCellDef="let e">{{ e.department }}</td>
      </ng-container>
      <ng-container matColumnDef="designation">
        <th mat-header-cell *matHeaderCellDef>Designation</th>
        <td mat-cell *matCellDef="let e">{{ e.designation }}</td>
      </ng-container>
      <ng-container matColumnDef="salary">
        <th mat-header-cell *matHeaderCellDef>Salary</th>
        <td mat-cell *matCellDef="let e">{{ e.salary | currency }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let e">
          <button mat-icon-button [routerLink]="['/employees', e._id]"><mat-icon>visibility</mat-icon></button>
          <button mat-icon-button [routerLink]="['/employees', e._id, 'edit']" color="accent"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button (click)="delete(e._id)" color="warn"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card>
</div>
